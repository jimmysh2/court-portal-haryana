version: '3.8'

# ============================================================
# Court Portal - Docker Compose (PRODUCTION - Govt Server)
# App runs in Docker. Database is the local PostgreSQL server.
# Requires .env file on the server with real credentials.
#
# Deploy with:   docker-compose -f docker-compose.prod.yml up -d --build
# ============================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: court-portal-app:latest
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env  # Created by install.bat on the server, never committed to git
    volumes:
      - ./backups:/app/backups
      - ./uploads:/app/uploads

volumes: {}
