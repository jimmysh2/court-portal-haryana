version: '3.8'

services:
  # ─── PostgreSQL Database ──────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-court_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB:       ${DB_NAME:-court_portal}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-court_user} -d ${DB_NAME:-court_portal}"]
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Hosting@123
      POSTGRES_DB: court_portal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d court_portal" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Application (Express + Vite-built frontend) ─────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-court_user}:${DB_PASSWORD:-changeme}@db:5432/${DB_NAME:-court_portal}?schema=public
    volumes:
      - ./backups:/app/backups
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:Hosting@123@db:5432/court_portal

volumes:
  postgres_data:
