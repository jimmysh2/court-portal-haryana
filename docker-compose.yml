version: '3.8'

services:
  # ─── PostgreSQL Database ──────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-court_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-court_portal}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-court_user} -d ${DB_NAME:-court_portal}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Court Portal Application ─────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # Build the DATABASE_URL from individual parts for clarity
      DATABASE_URL: postgresql://${DB_USER:-court_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-court_portal}?schema=public
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-court_user}
    volumes:
      - ./backups:/app/backups
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
