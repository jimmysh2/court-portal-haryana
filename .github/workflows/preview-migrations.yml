name: Preview Environment Prisma Migrations

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - master
    paths:
      - 'prisma/**'

jobs:
  wait-for-supabase:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.check.outputs.conclusion }}
    steps:
      - name: Wait for Supabase Preview Branch to Spin Up
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: check
        with:
          checkName: Supabase Preview
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

  migrate-preview-database:
    needs:
      - wait-for-supabase
    if: ${{ needs.wait-for-supabase.outputs.status == 'success' }}
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Extract Branch Database URL and Run Prisma
        run: |
          # Fetch the connection string of the isolated preview branch from Supabase
          supabase --experimental branches get "$GITHUB_HEAD_REF" -o env >> $GITHUB_ENV
          
          # Now run Prisma db push to apply any new schema changes strictly to the preview branch!
          # We use POSTGRES_URL_NON_POOLING which Supabase CLI exposes
          DATABASE_URL="$POSTGRES_URL_NON_POOLING" npx prisma db push --accept-data-loss
